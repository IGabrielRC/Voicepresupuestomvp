name: Deploy to Easypanel VPS via GHCR

# Hardened deploy workflow: pre-flight validation, exact-commit checkout,
# GHCR image build/push, sequential backend-then-frontend service update,
# deterministic health + smoke gates, and per-service automatic rollback.
# Easypanel/Swarm/Traefik are untouched; only this workflow file changes.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'README*'
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to deploy; defaults to triggering SHA
        required: false

permissions:
  contents: read
  packages: write

env:
  # Hardcoded defaults are intentional: a missing/misnamed value fails the
  # pre-flight checks loudly instead of silently deploying the wrong target.
  BACKEND_SERVICE: presupuesto_mvp_presupuesto_back
  FRONTEND_SERVICE: presupuesto_mvp_presupuesto_front
  BACKEND_SMOKE_URL: https://presupuesto-mvp-presupuesto-back.fwtktk.easypanel.host/api/health
  FRONTEND_SMOKE_URL: https://presupuesto-mvp-presupuesto-front.fwtktk.easypanel.host
  VPS_KNOWN_HOST: 72.60.28.69 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOJKdY+rQT7Dx9D8oGxPlClta2L/S0ybTJ2NhQj+cMVO
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_BASE: ghcr.io/igabrielrc/voicepresupuestomvp

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deploy commit
        id: resolve
        run: |
          set -euo pipefail
          DEPLOY_SHA="${{ inputs.commit_sha || github.sha }}"
          if [ -z "$DEPLOY_SHA" ]; then
            echo "ERROR: could not resolve deploy commit SHA." >&2
            exit 1
          fi
          if ! printf '%s' "$DEPLOY_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "ERROR: deploy commit must be a full 40-character lowercase Git SHA." >&2
            exit 1
          fi
          echo "Deploy commit: $DEPLOY_SHA"
          echo "DEPLOY_SHA=$DEPLOY_SHA" >> "$GITHUB_ENV"
          echo "deploy_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.deploy_sha }}
          persist-credentials: false

      - name: Prepare SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail

          if [ -z "$VPS_HOST" ]; then
            echo "ERROR: VPS_HOST GitHub secret is required." >&2
            exit 1
          fi
          if [ -z "$VPS_USER" ]; then
            echo "ERROR: VPS_USER GitHub secret is required." >&2
            exit 1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "ERROR: VPS_SSH_KEY GitHub secret is required." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key

          printf '%s\n' "$VPS_KNOWN_HOST" > ~/.ssh/known_hosts
          EXPECTED_VPS_HOST="$(printf '%s' "$VPS_KNOWN_HOST" | awk '{print $1}')"
          if [ "$VPS_HOST" != "$EXPECTED_VPS_HOST" ]; then
            echo "ERROR: VPS_HOST does not match the pinned known host." >&2
            exit 1
          fi

          if ! ssh -i ~/.ssh/vps_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$VPS_USER@$VPS_HOST" "echo ssh-ok"; then
            echo "ERROR: VPS unreachable via SSH." >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.GHCR_IMAGE_BASE }}/presupuesto_back:${{ steps.resolve.outputs.deploy_sha }}
            ${{ env.GHCR_IMAGE_BASE }}/presupuesto_back:latest

      - name: Verify VITE_API_URL secret
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          set -euo pipefail
          if [ -z "$VITE_API_URL" ]; then
            echo "ERROR: VITE_API_URL secret is required for frontend image build." >&2
            exit 1
          fi

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ env.GHCR_IMAGE_BASE }}/presupuesto_front:${{ steps.resolve.outputs.deploy_sha }}
            ${{ env.GHCR_IMAGE_BASE }}/presupuesto_front:latest

      - name: Deploy exact images to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_SHA: ${{ steps.resolve.outputs.deploy_sha }}
        run: |
          set -euo pipefail

          if [ -z "$DEPLOY_SHA" ]; then
            echo "ERROR: DEPLOY_SHA is empty; aborting deploy." >&2
            exit 1
          fi

          BACKEND_IMAGE="${GHCR_IMAGE_BASE}/presupuesto_back:${DEPLOY_SHA}"
          FRONTEND_IMAGE="${GHCR_IMAGE_BASE}/presupuesto_front:${DEPLOY_SHA}"

          ssh -i ~/.ssh/vps_deploy_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$VPS_USER@$VPS_HOST" \
            "BACKEND_IMAGE='$BACKEND_IMAGE' FRONTEND_IMAGE='$FRONTEND_IMAGE' BACKEND_SERVICE='$BACKEND_SERVICE' FRONTEND_SERVICE='$FRONTEND_SERVICE' BACKEND_SMOKE_URL='$BACKEND_SMOKE_URL' FRONTEND_SMOKE_URL='$FRONTEND_SMOKE_URL' DEPLOY_SHA='$DEPLOY_SHA' bash -s" <<'REMOTE'
            set -euo pipefail

            # --- Remote shell helpers ---
            fail() {
              echo "ERROR: $*" >&2
              exit 1
            }

            require_cmd() {
              command -v "$1" >/dev/null 2>&1 || fail "Missing required command on VPS: $1"
            }

            inspect_service() {
              local svc="$1"
              if ! docker service inspect "$svc" >/dev/null 2>&1; then
                fail "Pre-flight failed: Swarm service not found: $svc"
              fi
            }

            wait_service_running() {
              local svc="$1" timeout="${2:-180}" elapsed=0 state
              echo "Waiting for $svc to reach Running state (timeout ${timeout}s)..."
              while [ "$elapsed" -lt "$timeout" ]; do
                state="$(docker service ps "$svc" --filter desired-state=running --format '{{.CurrentState}} {{.Error}}' 2>/dev/null | head -n1 || true)"
                if printf '%s' "$state" | grep -q '^Running'; then
                  echo "OK: $svc reports: $state"
                  return 0
                fi
                sleep 5
                elapsed=$((elapsed + 5))
              done
              echo "ERROR: $svc did not reach Running within ${timeout}s." >&2
              echo "Current task state for $svc:" >&2
              docker service ps --no-trunc "$svc" >&2 || true
              return 1
            }

            rollback_service() {
              local svc="$1" label="$2"
              echo "ROLLBACK: reverting $label ($svc) to previous state..."
              if ! docker service update --rollback "$svc"; then
                echo "ERROR: Rollback failed for $label ($svc); manual intervention required." >&2
              fi
            }

            # deploy_service <label> <service> <image> <smoke_url> <smoke_mode:get|head>
            deploy_service() {
              local label="$1" svc="$2" image="$3" smoke_url="$4" smoke_mode="$5"
              echo "=== Deploy $label ($svc) ==="

              if ! docker service update --detach=false --force --image "$image" "$svc"; then
                rollback_service "$svc" "$label"
                fail "$label update failed for $svc; rollback attempted."
              fi

              if ! wait_service_running "$svc"; then
                rollback_service "$svc" "$label"
                fail "$label health check failed for $svc; rollback attempted. See task state above."
              fi

              echo "Smoke check ($smoke_mode): $smoke_url"
              if [ "$smoke_mode" = "head" ]; then
                if ! curl -fsSI --max-time 30 "$smoke_url" >/dev/null; then
                  rollback_service "$svc" "$label"
                  fail "$label smoke check failed ($smoke_url); rollback attempted."
                fi
              else
                if ! curl -fsS --max-time 30 "$smoke_url" >/dev/null; then
                  rollback_service "$svc" "$label"
                  fail "$label smoke check failed ($smoke_url); rollback attempted."
                fi
              fi
              echo "OK: $label updated, healthy, and reachable."
            }

            # --- Phase 1: Pre-flight validation ---
            # Abort point: any failure here stops before pull/update.
            echo "=== Pre-flight validation ==="
            require_cmd docker
            require_cmd curl
            inspect_service "$BACKEND_SERVICE"
            inspect_service "$FRONTEND_SERVICE"
            echo "OK: all pre-flight checks passed (commands present, services exist)."

            # --- Phase 2: Pull exact images ---
            echo "=== Pull exact images ==="
            docker pull "$BACKEND_IMAGE"
            docker pull "$FRONTEND_IMAGE"
            echo "OK: images pulled for $DEPLOY_SHA"

            # --- Phase 3: Sequential deploy (backend first, then frontend) ---
            # Backend is a hard dependency for frontend: a backend update
            # or health failure blocks the frontend work entirely.
            echo "=== Deploy backend (1/2) ==="
            deploy_service "backend" "$BACKEND_SERVICE" "$BACKEND_IMAGE" "$BACKEND_SMOKE_URL" "get"

            echo "=== Deploy frontend (2/2) ==="
            deploy_service "frontend" "$FRONTEND_SERVICE" "$FRONTEND_IMAGE" "$FRONTEND_SMOKE_URL" "head"

            # --- Phase 4: Summary ---
            echo "=== Deploy complete: $DEPLOY_SHA ==="
            echo "Backend then frontend updated, verified healthy, and reachable."
          REMOTE
